name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK
        run: |
          SDKMAN=$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager
          [ ! -f "$SDKMAN" ] && SDKMAN=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager
          [ ! -f "$SDKMAN" ] && SDKMAN=$ANDROID_HOME/tools/bin/sdkmanager
          yes | "$SDKMAN" "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -5

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore streamflow.keystore \
            -alias streamflow -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass streamflow123 -keypass streamflow123 \
            -dname "CN=StreamFlow, OU=Dev, O=StreamFlow, L=SP, ST=SP, C=BR"

      - name: Download Gradle
        run: |
          curl -sL https://services.gradle.org/distributions/gradle-8.2-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.2/bin" >> $GITHUB_PATH

      - name: Build APK
        run: |
          gradle assembleRelease --no-daemon --stacktrace 2>&1 | tee build.log
          exit ${PIPESTATUS[0]}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: streamflow-player-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
